{% extends "main.html" %}

{% block title %}Каталог{% endblock %}

{% block content %}
<head>
    <style>
        .btn-primary {
            background-color: #de98dc;
            border-color: #de98dc;
        }

        .btn-primary:hover {
            background-color: #d281cf;
            border-color: #d281cf;
        }

        .btn-primary:active {
            background-color: #d281cf !important;
            border-color: #d281cf !important;
        }
    </style>
</head>
<div class="container main-container">
    <div class="row">

        <!-- Боковая панель с категориями-->
        <div class="col-md-3 mb-4">
            <div class="card p-3 shadow-sm">
                <h5 class="mb-3">Категории</h5>
                <div class="list-group">
                    <a href="{{ url_for('catalog') }}" class="list-group-item list-group-item-action">Весь ассортимент</a>
                    <a href="{{ url_for('catalog', category='candy') }}" class="list-group-item list-group-item-action">Конфеты</a>
                    <a href="{{ url_for('catalog', category='cakes') }}" class="list-group-item list-group-item-action">Торты</a>
                    <a href="{{ url_for('catalog', category='pastry') }}" class="list-group-item list-group-item-action">Пирожные</a>
                    <a href="{{ url_for('catalog', category='chocolate') }}" class="list-group-item list-group-item-action">Шоколад</a>
                    <a href="{{ url_for('catalog', category='jam') }}" class="list-group-item list-group-item-action">Варенье</a>
                    <a href="{{ url_for('catalog', category='pies') }}" class="list-group-item list-group-item-action">Пироги</a>
                </div>
            </div>
        </div>

        <!-- Сам каталог товаров -->
        <div class="col-md-9">
            <div class="row g-4">

                {% for product in products %}
                <div class="col-md-4">
                    <div class="card demo-card h-100 p-2">
                        <img src="{{ product.image }}" class="card-img-top rounded" alt="{{ product.name }}">

                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">{{ product.name }}</h5>
                            <p class="text-muted small">{{ product.description }}</p>

                            <div class="mt-auto">
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="fw-bold fs-5">{{ product.price }} ₽</span>

                                    <form method="POST" action="{{ url_for('add_to_cart', product_id=product.id) }}">
                                        <button class="btn btn-primary w-100 mt-2">
                                            <i class="bi bi-cart-plus me-2"></i>
                                            В корзину
                                        </button>
                                    </form>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
                {% endfor %}

            </div>
        </div>

    </div>
</div>
{% endblock %}
