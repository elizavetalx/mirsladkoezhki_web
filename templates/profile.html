{% extends "main.html" %}

{% block title %}Профиль{% endblock %}

{% block content %}
<div class="container main-container">

    {% if session.get('user_id') %}

        <!-- профиль если раннее пользователь вошел-->
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card p-4 shadow-sm">
                    <h3 class="mb-3">Профиль</h3>

                    <p><strong>Имя пользователя:</strong> {{ user.username }}</p>
                    <hr>
                    <!-- смена имени -->
                    <h5 class="mt-3">Сменить имя</h5>
                    <form method="POST" action="{{ url_for('change_username') }}">
                        <div class="mb-3">
                            <input type="text" name="username" class="form-control" placeholder="Новое имя" required>
                        </div>
                        <button class="btn btn-dark w-100">Сохранить</button>
                    </form>

                    <!-- смена пароля -->
                    <h5 class="mt-4">Сменить пароль</h5>
                    <form method="POST" action="{{ url_for('change_password') }}">
                        <div class="mb-3">
                            <input type="password" name="old_password" class="form-control" placeholder="Старый пароль" required>
                        </div>
                        <div class="mb-3">
                            <input type="password" name="new_password" class="form-control" placeholder="Новый пароль" required>
                        </div>
                        <button class="btn btn-dark w-100">Обновить пароль</button>
                    </form>

                    <a href="{{ url_for('logout') }}" class="btn btn-danger w-100 mt-4">
                        Выйти
                    </a>
                </div>

            </div>
        </div>

    {% else %}

        <!-- вход -->
        <div class="row justify-content-center">
            <div class="col-md-5">

                <div class="card p-4 shadow-sm">
                    <h3 class="mb-4 text-center">Вход</h3>

                    <form method="POST" action="{{ url_for('login') }}">
                        <div class="mb-3">
                            <input type="text" name="username" class="form-control" placeholder="Имя пользователя" required>
                        </div>

                        <div class="mb-3">
                            <input type="password" name="password" class="form-control" placeholder="Пароль" required>
                        </div>

                        <button class="btn btn-primary w-100">
                            Войти
                        </button>
                    </form>

                    <hr>

                    <p class="text-center">
                        Нет аккаунта?
                    </p>

                    <a href="{{ url_for('register') }}" class="btn btn-outline-primary w-100">
                        Регистрация
                    </a>

                </div>

            </div>
        </div>

    {% endif %}

</div>
{% endblock %}
